<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warp · Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ambient" aria-hidden="true"></div>

    <header class="topbar">
        <div class="topbar-left">
            <a class="brand" href="https://github.com/minio/warp" aria-label="Warp">
                <img class="brand-logo brand-logo-dark" src="img/warp-logo-dark.png" alt="Warp">
                <img class="brand-logo brand-logo-light" src="img/warp-logo.png" alt="Warp">
            </a>
            <span class="brand-divider" aria-hidden="true"></span>
            <span class="brand-sub">Comparison</span>
        </div>
        <div class="topbar-right">
            <button class="btn btn-outline btn-icon" id="theme-toggle" aria-label="Toggle theme">
                <svg id="theme-icon-dark" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
                </svg>
                <svg id="theme-icon-light" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <section class="card">
            <header class="card-header">
                <div>
                    <h2 class="card-title">Files</h2>
                    <p class="card-description">Before / after benchmark sources</p>
                </div>
            </header>
            <div class="card-content">
                <div class="cmp-files" id="cmp-files"></div>
            </div>
        </section>

        <div id="cmp-ops"></div>
    </main>

    <footer class="footer-bar">
        <span>Generated by <a href="https://github.com/minio/warp">Warp</a></span>
        <span class="footer-tip">Press <kbd>T</kbd> theme</span>
    </footer>

    <script src="compare.js"></script>
</body>
</html>
